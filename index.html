<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPEC</title>
  <style>
    body {
      background-color: #0a1a2f; /* azul escuro */
      color: #00ffcc; /* verde/azul estilo terminal */
      font-family: "Courier New", monospace;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .terminal {
      background-color: #0d223d;
      border: 1px solid #00ffcc;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      text-align: left;
    }
    .senha input {
      font-size: 24px;
      text-align: center;
      letter-spacing: 10px;
      width: 150px;
      padding: 5px;
      border: 2px solid #00ffcc;
      background-color: #0d223d;
      color: #00ffcc;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background-color: #00ffcc;
      color: #0a1a2f;
      border: none;
      border-radius: 5px;
    }
    button:hover {
      background-color: #00cca3;
    }
  </style>
</head>
<body>

  <!-- Mensagem estilo terminal -->
  <div class="terminal">
    <p>Parabéns, Agente Tayna!</p>
    <p>Você demonstrou interesse em resolver os jogos.</p>
    <p>Para prosseguir, insira o código de 4 dígitos abaixo ela esta relacionada ao video anterior..:</p>
  </div>

  <!-- Campo de senha -->
  <div class="senha">
    <input type="password" id="senha" maxlength="4" placeholder="****">
    <br>
    <button onclick="validarSenha()">Enviar</button>
  </div>

  <script>
    function validarSenha() {
      const senha = document.getElementById("senha").value;
      const senhaCorreta = "7351";

      if (senha.length !== 4) {
        alert("Digite exatamente 4 dígitos.");
      } else if (senha === senhaCorreta) {
        alert("Código correto! Redirecionando...");
        window.location.href = "./spectre.html";
      } else {
        alert("Código incorreto. Tente novamente.");
      }
    }
  </script>

</body>
</html>
